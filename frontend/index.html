<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zathas AI</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d0d;
      --surface:      #1a1a1a;
      --surface-2:    #252525;
      --border:       #2e2e2e;
      --accent:       #7c3aed;
      --accent-light: #a78bfa;
      --text:         #e5e7eb;
      --text-muted:   #6b7280;
      --user-bg:      #4c1d95;
      --ai-bg:        #1f2937;
      --radius:       14px;
      --font:         'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header svg {
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-light), #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #chat-area {
      flex: 1;
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      padding: 24px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* ── Messages ────────────────────────────────────────────────────────── */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { flex-direction: row-reverse; }
    .message.ai    { flex-direction: row; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
    }

    .message.user .avatar {
      background: var(--accent);
      color: #fff;
    }

    .message.ai .avatar {
      background: var(--surface-2);
      color: var(--accent-light);
    }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: var(--radius);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bg);
      border-bottom-left-radius: 4px;
    }

    /* ── Typing indicator ────────────────────────────────────────────────── */
    #typing-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
    }

    #typing-indicator.visible { display: flex; }

    .typing-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--surface-2);
      color: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .dots {
      display: flex;
      gap: 5px;
      background: var(--ai-bg);
      padding: 10px 16px;
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Input bar ────────────────────────────────────────────────────────── */
    #input-area {
      width: 100%;
      max-width: 800px;
      padding: 12px 16px 20px;
      border-top: 1px solid var(--border);
    }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.15s;
    }

    #input-row:focus-within {
      border-color: var(--accent);
    }

    #message-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      resize: none;
      max-height: 160px;
      line-height: 1.5;
    }

    #message-input::placeholder { color: var(--text-muted); }

    #send-btn {
      flex-shrink: 0;
      background: var(--accent);
      border: none;
      border-radius: 9px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { background: #6d28d9; }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { pointer-events: none; }

    #hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Error toast ─────────────────────────────────────────────────────── */
    #error-toast {
      display: none;
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #7f1d1d;
      color: #fca5a5;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 100;
      max-width: 360px;
      text-align: center;
    }

    /* ── Welcome screen ──────────────────────────────────────────────────── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    #welcome h2 { font-size: 1.4rem; color: var(--text); }
    #welcome p  { font-size: 0.95rem; max-width: 340px; }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    #chat-area::-webkit-scrollbar { width: 5px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="14" fill="#4c1d95"/>
      <path d="M8 19L14 9l6 10H8z" fill="#a78bfa"/>
    </svg>
    <h1>Zathas AI</h1>
  </header>

  <div id="chat-area">
    <div id="welcome">
      <h2>How can I help you today?</h2>
      <p>Type a message below to start a conversation with your local AI.</p>
    </div>
  </div>

  <div id="typing-indicator">
    <div class="typing-avatar">Z</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea
        id="message-input"
        rows="1"
        placeholder="Message Zathas AI…"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" title="Send (Enter)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p id="hint">Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for a new line</p>
  </div>

  <div id="error-toast"></div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    const history = [];   // [{ role: "user"|"assistant", content: "..." }]
    let   isLoading = false;

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const chatArea      = document.getElementById('chat-area');
    const welcome       = document.getElementById('welcome');
    const typingEl      = document.getElementById('typing-indicator');
    const inputEl       = document.getElementById('message-input');
    const sendBtn       = document.getElementById('send-btn');
    const errorToast    = document.getElementById('error-toast');

    // ── Auto-grow textarea ─────────────────────────────────────────────────────
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });

    // ── Send on Enter (Shift+Enter = newline) ──────────────────────────────────
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Append a message bubble ────────────────────────────────────────────────
    function appendMessage(role, content) {
      if (welcome) welcome.style.display = 'none';

      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'U' : 'Z';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      chatArea.appendChild(wrapper);
      scrollToBottom();
      return bubble;
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // ── Typing indicator ───────────────────────────────────────────────────────
    function showTyping()  { typingEl.classList.add('visible');    scrollToBottom(); }
    function hideTyping()  { typingEl.classList.remove('visible'); }

    // ── Error toast ────────────────────────────────────────────────────────────
    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.style.display = 'block';
      setTimeout(() => { errorToast.style.display = 'none'; }, 5000);
    }

    // ── Main send function ─────────────────────────────────────────────────────
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      appendMessage('user', text);
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            history: history.slice()   // send a copy of the current history
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || `Server error ${res.status}`);
        }

        const reply = data.response || '';

        // Persist to local history
        history.push({ role: 'user',      content: text  });
        history.push({ role: 'assistant', content: reply });

        hideTyping();
        appendMessage('ai', reply);

      } catch (err) {
        hideTyping();
        showError('Error: ' + err.message);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // Focus input on load
    inputEl.focus();
  </script>
</body>
</html>
